<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kelira - Espiritualidade, Ocultismo e Oráculos</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0806;
            background-image: 
                radial-gradient(circle at 10% 20%, #1a1410 0%, #0a0806 70%),
                repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(40,30,20,0.05) 40px, rgba(40,30,20,0.05) 41px);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Playfair Display', 'Times New Roman', serif;
            padding: 15px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(10, 8, 6, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 30px 30px 20px 20px;
            padding: 25px 30px 35px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.95),
                0 0 0 1px #6b4f1a88,
                0 0 40px #6b4f1a33,
                inset 0 0 80px rgba(0,0,0,0.5);
            border: 1px solid #8b6f2a;
            position: relative;
            overflow: hidden;
        }

        .water-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.06;
            border-radius: inherit;
            overflow: hidden;
        }
        .water-bg::before,
        .water-bg::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: 
                radial-gradient(circle at 25% 35%, rgba(30, 80, 120, 0.2) 0%, transparent 55%),
                radial-gradient(circle at 75% 70%, rgba(20, 60, 100, 0.15) 0%, transparent 45%);
            border-radius: 30% 70% 50% 50% / 50% 40% 60% 50%;
            animation: ondaSombria 14s infinite alternate ease-in-out;
        }
        .water-bg::after {
            background: radial-gradient(circle at 60% 30%, rgba(20, 70, 110, 0.15) 0%, transparent 50%);
            animation: ondaSombria 18s infinite alternate-reverse ease-in-out;
            opacity: 0.6;
        }
        @keyframes ondaSombria {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(-8%, -6%) rotate(4deg) scale(1.15); }
        }

        .roots-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.04;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(139, 111, 42, 0.03) 60px, rgba(139, 111, 42, 0.03) 61px),
                repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(139, 111, 42, 0.02) 80px, rgba(139, 111, 42, 0.02) 81px),
                radial-gradient(circle at 20% 50%, rgba(80, 60, 30, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 30%, rgba(80, 60, 30, 0.04) 0%, transparent 35%);
            border-radius: inherit;
        }

        .content {
            position: relative;
            z-index: 2;
        }

        .main-title {
            font-family: 'MedievalSharp', 'Playfair Display', cursive;
            font-size: 3.2rem;
            font-weight: 700;
            color: #b8943a;
            text-shadow: 
                0 0 20px #6b4f1a66,
                0 0 60px #6b4f1a22,
                0 4px 12px rgba(0,0,0,0.9);
            text-align: center;
            letter-spacing: 8px;
            margin-bottom: 2px;
            word-spacing: 10px;
        }
        .main-title::after {
            content: '';
            display: block;
            width: 80px;
            height: 2px;
            margin: 6px auto 0;
            background: linear-gradient(90deg, transparent, #8b6f2a, transparent);
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            color: #9a8048;
            text-align: center;
            font-size: 0.9rem;
            letter-spacing: 8px;
            opacity: 0.6;
            border-top: 1px solid #6b4f1a44;
            border-bottom: 1px solid #6b4f1a44;
            display: inline-block;
            padding: 6px 25px;
            margin: 0 auto 20px;
            backdrop-filter: blur(4px);
            border-radius: 30px;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            border-bottom: 2px solid #6b4f1a66;
            padding-bottom: 0;
            margin-bottom: 22px;
            border-radius: 25px 25px 0 0;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 6px 0 6px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 12px 24px;
            font-family: 'Inter', 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 500;
            color: #8a7a5a;
            border-radius: 25px 25px 0 0;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            position: relative;
            background: rgba(20, 16, 12, 0.5);
            backdrop-filter: blur(2px);
            border: 1px solid transparent;
            border-bottom: none;
            margin-bottom: -1px;
        }
        .tab-btn:hover {
            background: #6b4f1a33;
            color: #c9a84c;
            transform: translateY(-2px);
        }
        .tab-btn.active {
            background: #0a0806;
            color: #d4af37;
            border-color: #8b6f2a;
            border-bottom-color: #0a0806;
            box-shadow: 
                0 -4px 20px #6b4f1a44,
                inset 0 -3px 0 #b8943a;
            border-radius: 25px 25px 0 0;
        }

        .tab-content {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 25px 25px 20px 20px;
            padding: 22px 25px 32px;
            border: 1px solid #6b4f1a66;
            box-shadow: 
                inset 0 0 50px #00000088,
                0 10px 30px #000000aa;
            min-height: 300px;
        }
        .tab-pane {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .tab-pane.active {
            display: block;
        }
        @keyframes fadeIn {
            0% { opacity: 0.2; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-family: 'MedievalSharp', 'Playfair Display', cursive;
            color: #d4af37;
            font-size: 2rem;
            text-shadow: 0 0 15px #6b4f1a55;
            border-left: 4px solid #8b6f2a;
            padding-left: 16px;
            margin-bottom: 16px;
            border-radius: 0 25px 25px 0;
            font-weight: 400;
        }

        p, label, .info-text, .disclaimer, .ponto-explicacao {
            color: #d4c8b0;
            font-family: 'Inter', 'Playfair Display', serif;
            font-weight: 300;
            line-height: 1.8;
            font-size: 1rem;
            letter-spacing: 0.3px;
        }

        input, select, textarea {
            width: 100%;
            max-width: 350px;
            padding: 12px 20px;
            margin: 6px 0 14px;
            background: #14100c;
            border: 2px solid #6b4f1a88;
            border-radius: 40px !important;
            color: #e8ddc8;
            font-family: 'Inter', 'Playfair Display', serif;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
            box-shadow: inset 0 4px 15px #00000066;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #b8943a;
            box-shadow: 0 0 30px #6b4f1a44, inset 0 4px 15px #00000088;
            background: #1c1612;
        }
        input::placeholder {
            color: #8a7a5a88;
            font-weight: 300;
            font-size: 0.9rem;
        }

        .btn {
            background: linear-gradient(145deg, #1a1410, #0a0806);
            border: 2px solid #8b6f2a;
            padding: 12px 32px;
            border-radius: 40px !important;
            color: #d4af37;
            font-family: 'Inter', 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 5px 0 #4a3518, 0 10px 30px #00000077;
            letter-spacing: 2px;
            margin: 4px 4px 4px 0;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn i {
            color: #b8943a;
            font-size: 0.9rem;
        }
        .btn:hover {
            transform: translateY(-3px);
            background: linear-gradient(145deg, #2a1f18, #14100c);
            box-shadow: 0 7px 0 #5a4020, 0 15px 40px #00000099;
            border-color: #d4af37;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #4a3518;
        }

        .result-box {
            background: #0a0806;
            border: 1px solid #6b4f1a55;
            border-radius: 40px !important;
            padding: 20px 26px;
            margin: 16px 0 8px;
            box-shadow: inset 0 0 25px #00000077, 0 8px 20px #000000aa;
            color: #e8ddc8;
            font-size: 1rem;
            font-family: 'Inter', 'Playfair Display', serif;
            word-break: break-word;
            line-height: 1.8;
        }

        .info-card {
            background: rgba(0,0,0,0.3);
            border-radius: 40px !important;
            padding: 24px 28px;
            border: 1px dashed #6b4f1a66;
            text-align: center;
            backdrop-filter: blur(2px);
        }
        .info-card i {
            font-size: 2.5rem;
            color: #b8943a;
            opacity: 0.3;
            margin-bottom: 12px;
        }

        .wave-divider {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 8px 0 14px;
            opacity: 0.12;
            font-size: 1.3rem;
            color: #3a7a9a;
        }

        .footer {
            margin-top: 22px;
            text-align: center;
            font-size: 0.75rem;
            color: #6b5a3a66;
            border-top: 1px solid #6b4f1a33;
            padding-top: 16px;
            border-radius: 30px;
            font-family: 'Inter', 'Playfair Display', serif;
            letter-spacing: 2px;
        }

        .field-group {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            align-items: flex-end;
        }
        .field-group > div {
            flex: 1;
            min-width: 140px;
        }
        .field-group input {
            max-width: 100%;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: #9a8a6a;
            margin-bottom: 2px;
            letter-spacing: 1.5px;
            font-weight: 400;
        }

        .cabala-tabela {
            width: 100%;
            border-collapse: collapse;
            margin: 14px 0;
            border-radius: 25px;
            overflow: hidden;
            font-size: 0.9rem;
        }
        .cabala-tabela th {
            background: #14100c;
            color: #b8943a;
            padding: 10px 14px;
            text-align: left;
            border-bottom: 2px solid #6b4f1a55;
            font-weight: 600;
            letter-spacing: 1.5px;
        }
        .cabala-tabela td {
            padding: 10px 14px;
            border-bottom: 1px solid #6b4f1a33;
            color: #d4c8b0;
        }
        .cabala-tabela tr:last-child td {
            border-bottom: none;
        }
        .cabala-tabela tr:hover td {
            background: #14100c66;
        }
        .cabala-tabela .highlight {
            color: #d4af37;
            font-weight: 700;
        }

        .disclaimer {
            background: #14100c66;
            border-left: 4px solid #8b6f2a;
            padding: 16px 22px;
            border-radius: 25px;
            margin-bottom: 20px;
            font-style: italic;
            font-size: 0.9rem;
            color: #c0b098;
            line-height: 1.8;
            font-weight: 300;
        }

        .ponto-explicacao {
            margin: 12px 0;
            padding: 14px 18px;
            background: #0a080688;
            border-radius: 25px;
            border: 1px solid #6b4f1a33;
        }
        .ponto-explicacao strong {
            color: #d4af37;
            font-weight: 600;
        }

        @media (max-width: 700px) {
            .container { padding: 15px; border-radius: 25px; }
            .main-title { font-size: 2.4rem; letter-spacing: 4px; }
            .tab-btn { padding: 10px 16px; font-size: 0.85rem; }
            .tab-content { padding: 18px; border-radius: 20px; }
            h2 { font-size: 1.6rem; padding-left: 12px; }
            input { max-width: 100%; }
            .btn { padding: 10px 20px; font-size: 0.9rem; }
            .result-box { padding: 14px 18px; font-size: 0.9rem; }
            .cabala-tabela { font-size: 0.8rem; }
            .cabala-tabela th, .cabala-tabela td { padding: 8px 10px; }
            p, label, .info-text { font-size: 0.9rem; }
        }
        @media (max-width: 480px) {
            .main-title { font-size: 2rem; letter-spacing: 2px; }
            .subtitle { font-size: 0.7rem; letter-spacing: 4px; padding: 4px 14px; }
            .tab-btn { padding: 8px 12px; font-size: 0.7rem; letter-spacing: 1px; }
            .info-card { padding: 16px; }
            .info-card i { font-size: 1.8rem; }
            .disclaimer { font-size: 0.8rem; padding: 12px 16px; }
            .ponto-explicacao { padding: 10px 14px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="water-bg"></div>
    <div class="roots-pattern"></div>

    <div class="content">
        <h1 class="main-title">Kelira</h1>
        <div style="text-align: center;">
            <span class="subtitle">espírito · mistério · oráculo</span>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="inicio">Início</button>
            <button class="tab-btn" data-tab="cabala">Cabala</button>
        </div>

        <div class="tab-content">
            <!-- INÍCIO -->
            <div id="inicio" class="tab-pane active">
                <h2>Bem-vindo</h2>
                <div class="info-card">
                    <i class="fas fa-moon"></i>
                    <p style="font-size: 1.1rem; color: #d4c8b0;">
                        espaço sagrado para explorar os mistérios do oculto
                    </p>
                    <div class="wave-divider">
                        <i class="fas fa-water"></i><i class="fas fa-water"></i><i class="fas fa-water"></i>
                    </div>
                    <p class="info-text">
                        informações básicas em breve...
                    </p>
                    <p class="info-text" style="margin-top: 14px; opacity: 0.5; font-size: 0.85rem;">
                        a sabedoria ancestral encontra a tecnologia
                    </p>
                </div>
            </div>

            <!-- CABALA -->
            <div id="cabala" class="tab-pane">
                <h2>Cabala</h2>
                <p>preencha seus dados para calcular sua cabala pessoal.</p>
                
                <div class="field-group">
                    <div>
                        <label>Nome Completo</label>
                        <input type="text" id="cabalaNome" placeholder="seu nome completo" />
                    </div>
                    <div>
                        <label>Data de Nascimento</label>
                        <input type="date" id="cabalaData" />
                    </div>
                </div>
                <button class="btn" onclick="calcularCabalaCompleta()">calcular cabala</button>
                
                <div id="cabalaResultado" class="result-box">
                    aguardando seus dados...
                </div>
            </div>
        </div>

        <div class="footer">
            <span>Kelira · místico & digital</span>
        </div>
    </div>
</div>

<script>
    // ABAS
    const tabs = document.querySelectorAll('.tab-btn');
    const panes = document.querySelectorAll('.tab-pane');

    tabs.forEach(btn => {
        btn.addEventListener('click', function() {
            tabs.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            panes.forEach(p => p.classList.remove('active'));
            document.getElementById(this.getAttribute('data-tab')).classList.add('active');
        });
    });

    // ============================================================
    // CABALA COMPLETA
    // ============================================================
    const orixas = {
        1: 'Exu', 2: 'Obá', 3: 'Ogum', 4: 'Egum-gum/Iemanjá',
        5: 'Oxum', 6: 'Oxóssi/Obará', 7: 'Omulu', 8: 'Oxaguiã',
        9: 'Iemanjá', 10: 'Oxalofã', 11: 'Iansã', 12: 'Xangô',
        13: 'Nanã', 14: 'Oxumarê', 15: 'Iroko', 16: 'Orumilá'
    };

    const descricoes = {
        'Odu': 'representa a energia ancestral predominante. Quando não há desenvolvimento espiritual na vida atual, essa força tende a vir da encarnação anterior.',
        'Nuca': 'energia de proteção ligada ao que não é visível; atua no campo inconsciente e espiritual.',
        'Testa': 'energia que se manifesta primeiro. Funciona como o "ascendente": a forma como você se apresenta ao mundo e como é percebido.',
        'Esquerda': 'representa o karma: desafios e padrões difíceis que você veio trabalhar e superar nesta encarnação.',
        'Direita': 'indica seus dons naturais: energias com as quais você lida com mais facilidade.',
        'Coroa': 'energia central da encarnação atual; geralmente ligada a algo que você veio desenvolver ou conquistar.'
    };

    function reduzirAte16(num) {
        while (num > 16) {
            let soma = 0;
            let str = num.toString();
            for (let i = 0; i < str.length; i++) {
                soma += parseInt(str[i]);
            }
            num = soma;
        }
        return num;
    }

    function calcularCabalaCompleta() {
        const nome = document.getElementById('cabalaNome').value.trim();
        const data = document.getElementById('cabalaData').value;
        const resultado = document.getElementById('cabalaResultado');

        if (!nome || !data) {
            resultado.innerHTML = 'preencha nome completo e data de nascimento.';
            return;
        }

        const partes = data.split('-');
        const ano = parseInt(partes[0]);
        const mes = parseInt(partes[1]);
        const dia = parseInt(partes[2]);

        const anoStr = ano.toString();
        const primeirosAno = parseInt(anoStr.substring(0, 2));
        const ultimosAno = parseInt(anoStr.substring(2, 4));

        const linha1 = dia;
        const linha2 = mes;
        const linha3 = primeirosAno;
        const linha4 = ultimosAno;

        let somaTotal = 0;
        const todosNumeros = [linha1, linha2, linha3, linha4];
        todosNumeros.forEach(num => {
            let str = num.toString();
            for (let i = 0; i < str.length; i++) {
                somaTotal += parseInt(str[i]);
            }
        });
        const odu = reduzirAte16(somaTotal);

        let nuca = 0;
        todosNumeros.forEach(num => {
            let str = num.toString();
            nuca += parseInt(str[0]);
        });
        nuca = reduzirAte16(nuca);

        let testa = 0;
        todosNumeros.forEach(num => {
            let str = num.toString();
            if (str.length > 1) {
                testa += parseInt(str[1]);
            }
        });
        testa = reduzirAte16(testa);

        let direita = reduzirAte16(nuca + testa);
        let esquerda = reduzirAte16(nuca + testa + direita);
        let coroa = reduzirAte16(nuca + testa + direita + esquerda);

        const pontos = {
            'Odu': odu,
            'Nuca': nuca,
            'Testa': testa,
            'Direita': direita,
            'Esquerda': esquerda,
            'Coroa': coroa
        };

        let html = '';

        html += `<div class="disclaimer">
            embora a leitura da cabala siga um método fixo de cálculo, as energias não se manifestam de forma totalmente rígida. A expressão dessas forças pode variar de acordo com o caminho espiritual da pessoa e seu momento de vida.
            <br><br>
            um mesmo número pode representar uma base energética, mas sua manifestação prática tende a se adaptar à vibração atual do indivíduo, considerando o conjunto da cabala e seu nível de desenvolvimento.
            <br><br>
            por isso, os resultados não devem ser interpretados como absolutos, mas como um direcionamento. Eles oferecem compreensão e base energética, mas o entendimento mais profundo exige acompanhamento e orientação espiritual adequada.
        </div>`;

        html += `<p style="font-size: 1.2rem; color: #d4c8b0; margin-bottom: 14px;">
            <strong>${nome}</strong> · ${dia}/${mes}/${ano}
        </p>`;

        html += `<table class="cabala-tabela">
            <thead>
                <tr><th>ponto</th><th>número</th><th>orixá</th></tr>
            </thead>
            <tbody>`;
        for (let [ponto, valor] of Object.entries(pontos)) {
            html += `<tr>
                <td><strong>${ponto}</strong></td>
                <td class="highlight">${valor}</td>
                <td>${orixas[valor] || '—'}</td>
            </tr>`;
        }
        html += `</tbody></table>`;

        html += `<div style="margin-top: 18px;">`;
        for (let [ponto, valor] of Object.entries(pontos)) {
            const orixa = orixas[valor] || 'desconhecido';
            const desc = descricoes[ponto] || '';
            const ehEsquerda = (ponto === 'Esquerda');
            const ehDireita = (ponto === 'Direita');
            
            let luzSombra = '';
            if (ehEsquerda) {
                luzSombra = `<br>sombra: você tende a ter mais dificuldade em lidar com a energia de ${orixa}, pois essa é uma força que precisa ser compreendida e superada nesta encarnação. Desafios relacionados a essa vibração serão recorrentes até que você aprenda a transmutá-los.`;
            } else if (ehDireita) {
                luzSombra = `<br>luz: você possui facilidade natural com a energia de ${orixa}. Essa é uma força que flui espontaneamente em sua vida, trazendo dons e talentos que podem ser desenvolvidos com maior facilidade.`;
            } else {
                luzSombra = `<br>equilíbrio: a energia de ${orixa} atua de forma equilibrada em sua vida, oferecendo tanto desafios construtivos quanto dons naturais, dependendo do seu momento espiritual.`;
            }

            html += `<div class="ponto-explicacao">
                <strong>${ponto} (${valor} — ${orixa})</strong><br>
                <span style="font-size: 0.9rem; color: #c0b098;">${desc}</span>
                ${luzSombra}
            </div>`;
        }
        html += `</div>`;

        html += `<div style="margin-top: 18px; text-align: center; font-size: 0.85rem; opacity: 0.6; border-top: 1px solid #6b4f1a33; padding-top: 16px;">
            que a sabedoria ancestral ilumine seu caminho.
        </div>`;

        resultado.innerHTML = html;
        resultado.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
